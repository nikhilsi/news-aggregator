# News Aggregator — Source Registry
#
# All sources are listed here. Set enabled: true/false to control which are active.
# Start with a few enabled sources; expand as features are built and tested.

sources:
  # ── Feel Good / Positive News ──────────────────────────────────────────
  - id: good-news-network
    name: Good News Network
    type: rss
    url: https://www.goodnewsnetwork.org/feed/
    category: feel_good
    is_curated_positive: true
    enabled: true
    cache_ttl_minutes: 15

  - id: positive-news
    name: Positive News
    type: rss
    url: https://positive.news/feed
    category: feel_good
    is_curated_positive: true
    enabled: true
    cache_ttl_minutes: 15

