name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          mkdir -p android/ClearNews/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/ClearNews/keystore/clearnews-release.jks

      - name: Create keystore.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/ClearNews/keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/ClearNews/keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/ClearNews/keystore.properties
          echo "storeFile=../keystore/clearnews-release.jks" >> android/ClearNews/keystore.properties

      - name: Build release APK
        working-directory: android/ClearNews
        run: ./gradlew assembleRelease

      - name: Build release AAB
        working-directory: android/ClearNews
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp android/ClearNews/app/build/outputs/apk/release/app-release.apk ClearNews-${VERSION}.apk
          cp android/ClearNews/app/build/outputs/bundle/release/app-release.aab ClearNews-${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClearNews-*.apk
            ClearNews-*.aab
          generate_release_notes: true
          draft: false
