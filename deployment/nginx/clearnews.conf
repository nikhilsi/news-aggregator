# ── Rate Limiting ──────────────────────────────────────────────────────
# General API: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name getclearnews.com www.getclearnews.com;
    return 301 https://getclearnews.com$request_uri;
}

# ── www → naked domain redirect ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.getclearnews.com;

    ssl_certificate /etc/letsencrypt/live/getclearnews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getclearnews.com/privkey.pem;

    return 301 https://getclearnews.com$request_uri;
}

# ── Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name getclearnews.com;

    server_tokens off;
    client_max_body_size 1m;

    # ── SSL/TLS ────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/getclearnews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getclearnews.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

    # Hide upstream server technology headers
    proxy_hide_header X-Powered-By;

    # ── General API ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # RSS fetching can be slow on first load (cold cache)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── Backend Health Check ───────────────────────────────────────────
    location /health {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Static Pages (privacy, support) ─────────────────────────────────
    location = /privacy {
        alias /opt/app/deployment/static/privacy.html;
        default_type text/html;
    }
    location = /support {
        alias /opt/app/deployment/static/support.html;
        default_type text/html;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
