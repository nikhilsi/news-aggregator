# ── Rate Limiting ──────────────────────────────────────────────────────
# General API: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Auth endpoints: 5 requests/minute per IP (stricter for login)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name getclearnews.com www.getclearnews.com;
    return 301 https://getclearnews.com$request_uri;
}

# ── www → naked domain redirect ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.getclearnews.com;

    ssl_certificate /etc/letsencrypt/live/getclearnews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getclearnews.com/privkey.pem;

    return 301 https://getclearnews.com$request_uri;
}

# ── Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name getclearnews.com;

    # ── SSL/TLS ────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/getclearnews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getclearnews.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

    # ── Auth API (stricter rate limit) ─────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── General API ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # RSS fetching can be slow on first load (cold cache)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── Backend Health Check ───────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
